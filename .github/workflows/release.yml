name: Release & Publish

on:
  push:
    branches: [main]
    paths:
      - 'packages/components/src/**'
      - 'packages/components/package.json'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci') && !contains(github.event.head_commit.message, 'chore(release)')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if first release
        id: check-tags
        run: |
          if git tag -l "@electroplix/components@*" | grep -q .; then
            echo "first_release=false" >> $GITHUB_OUTPUT
          else
            echo "first_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Version, Changelog & Tag
        id: version
        run: |
          if [ "${{ steps.check-tags.outputs.first_release }}" = "true" ]; then
            npx nx release --skip-publish --first-release
          else
            npx nx release --skip-publish
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        working-directory: packages/components
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
